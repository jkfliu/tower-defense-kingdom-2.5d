<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sylvan Defenders 2.5D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Cinzel', serif; color: #ccc; }
  #hud-level { font-size: 16px; letter-spacing: 0.08em; color: #e8d8a0; opacity: 0.75; margin-bottom: 4px; }
  #hud-main  { display: flex; gap: 24px; align-items: center; background: #0d1117; border: 1px solid #2a2a4a; border-radius: 4px; padding: 6px 18px; margin-bottom: 6px; font-size: 13px; letter-spacing: 0.04em; }
  #hud-main span   { opacity: 0.75; }
  #hud-main strong { opacity: 1; margin-left: 4px; }
  #sound-toggle { cursor: pointer; user-select: none; font-size: 15px; opacity: 0.65; transition: opacity 0.15s; }
  #sound-toggle:hover { opacity: 1; }
  #game-container canvas { display: block; }
  #info { margin-top: 8px; margin-bottom: 6px; font-size: 14px; opacity: 0.7; }
  #statusbar { margin-top: 6px; font-size: 12px; letter-spacing: 0.05em; min-height: 18px; }
  #statusbar.valid   { color: #f0c040; opacity: 1; }
  #statusbar.invalid { color: #ff6666; opacity: 1; }
  #statusbar.neutral { color: #ccc;    opacity: 0.5; }
  .gold { color: #f0c040; }
  .info-active { color: #f0c040; opacity: 1; }
</style>
</head>
<body>
<div id="hud-level"></div>
<div id="hud-main">
  <span>Wave <strong id="hud-wave">— / —</strong></span>
  <span>Lives <strong id="hud-lives">—</strong></span>
  <span>Score <strong id="hud-score">0</strong></span>
  <span>Gold <strong id="hud-gold" class="gold">—</strong></span>
  <span id="sound-toggle" title="Toggle sound">🔊</span>
</div>
<div id="game-container"></div>
<div id="info">S Start Wave · P Pause · R Restart level · <span id="info-dev" style="display:none"> F Fast Forward · <span id="info-debug">D Debug</span> · <span id="info-editor">E Editor</span></span></div>
<div id="statusbar" class="neutral"></div>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script type="module" src="src/main.js"></script>
<script type="module">
  import { soundManager } from './src/utils/sound.js';
  const btn = document.getElementById('sound-toggle');
  function updateBtn() { btn.textContent = soundManager.isMuted() ? '🔇' : '🔊'; }
  updateBtn();
  btn.addEventListener('click', () => { soundManager.setMuted(!soundManager.isMuted()); updateBtn(); });
</script>
</body>
</html>
