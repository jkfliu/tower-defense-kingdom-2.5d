<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sylvan Defenders 2.5D — Dictionary</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1a2e; color: #e8d8a0; font-family: 'Cinzel', serif; padding: 24px; }
    h1 { text-align: center; font-size: 28px; color: #f0c040; margin-bottom: 6px; letter-spacing: 2px; }
    .subtitle { text-align: center; color: #888; font-size: 12px; margin-bottom: 36px; letter-spacing: 0.05em; }
    h2 { font-size: 16px; color: #f0c040; border-bottom: 1px solid #2a2a4a; padding-bottom: 8px; margin: 36px 0 16px; letter-spacing: 1px; }
    h3 { font-size: 13px; color: #cccccc; margin-bottom: 6px; text-align: center; }

    .grid { display: flex; flex-wrap: wrap; gap: 16px; }

    /* Tower cards */
    .tower-card {
      background: #0d1117;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 14px;
      width: 160px;
      text-align: center;
    }
    .tower-card img { display: block; margin: 0 auto; border-radius: 4px; background: #1a2a1a; }
    .tower-stats { font-size: 11px; color: #666; margin-top: 10px; line-height: 1.8; text-align: left; }
    .tower-stats span { color: #e8d0a0; }
    /* Fixed-height base block so every card's upgrade section starts at the same Y,
       aligning the Level 2 rows horizontally regardless of base stat-line count. */
    .tower-base { min-height: 280px; }
    .tower-upgrade { margin-top: 12px; padding-top: 10px; border-top: 1px dashed #2a2a4a; }

    /* Enemy cards */
    .enemy-card {
      background: #0d1117;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 14px;
      width: 150px;
      text-align: center;
    }
    .enemy-card canvas { display: block; margin: 0 auto; border-radius: 4px; background: #1a2a1a; }
    .enemy-stats { font-size: 11px; color: #666; margin-top: 10px; line-height: 1.8; text-align: left; }
    .enemy-stats span { color: #e8d0a0; }

    .bullet-dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      vertical-align: middle;
      margin-right: 4px;
    }

    /* Level cards */
    .level-card {
      background: #0d1117;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 14px;
      width: 320px;
    }
    .level-card canvas { display: block; border-radius: 4px; width: 100%; }
    .level-card h3 { text-align: left; margin-bottom: 4px; color: #f0c040; }
    .level-desc { font-size: 11px; color: #666; margin: 6px 0 8px; font-family: Georgia, serif; font-style: italic; line-height: 1.5; }
    .level-meta { display: flex; gap: 16px; font-size: 11px; color: #666; }
    .level-meta span { color: #e8d0a0; }
    .level-unbuilt { display: flex; align-items: center; justify-content: center; height: 80px; font-size: 11px; color: #333; border-radius: 4px; background: #0a0a14; }

    .subtitle a { color: #e8d8a0; text-decoration: none; opacity: 0.8; }
    .subtitle a:hover { color: #f0c040; opacity: 1; }

    a.back { display: inline-block; margin-bottom: 24px; color: #f0c040; text-decoration: none; font-size: 12px; letter-spacing: 0.05em; }
    a.back:hover { color: #ffe080; }
  </style>
</head>
<body>

<a class="back" href="index.html">← Back to game</a>
<h1>Sylvan Defenders 2.5D</h1>
<p class="subtitle">Game Dictionary — <a href="#levels">Levels</a> · <a href="#towers">Towers</a> · <a href="#enemies">Enemies</a></p>

<h2 id="levels">🗺 Levels</h2>
<div class="grid" id="levels-grid"></div>

<h2 id="towers">🏰 Towers</h2>
<div class="grid" id="towers-grid"></div>

<h2 id="enemies">👹 Enemies</h2>
<div class="grid" id="enemies-grid"></div>

<script type="module">
// Pull the real game data straight from the source of truth so this page can
// never drift out of sync. (Previously these were hand-copied here and went stale.)
import { CAMPAIGN_LEVELS, LEVELS as GAME_LEVELS } from './src/data/levels.js';
import { TURRET_TYPES as GAME_TURRETS } from './src/data/turrets.js';
import { ENEMY_TYPES as GAME_ENEMIES } from './src/data/enemies.js';
import { DEFENDER_TYPE, defenderForLevel } from './src/data/defenders.js';

const CANVAS_W = 900, CANVAS_H = 560;

// Game data is keyed/structured for the engine; adapt it to the flat shapes this
// page renders. Real LEVELS map to campaign cards by array order (level-1 → id 0).
const TURRET_TYPES = Object.values(GAME_TURRETS);
const LEVELS = GAME_LEVELS.map((lv, i) => ({ campaignId: i, background: lv.background }));

const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
const ENEMY_TYPES = Object.values(GAME_ENEMIES).map(e => {
  const walk = e.animations.find(a => a.key === 'walk') ?? { row: 1, frames: 1 };
  return { ...e, label: cap(e.key), walkRow: walk.row, walkFrames: walk.frames };
});

// ─── Levels ───────────────────────────────────────────────────────────────────
const THUMB_W = 292, THUMB_H = Math.round(292 * (CANVAS_H / CANVAS_W));
const levelsGrid = document.getElementById('levels-grid');

CAMPAIGN_LEVELS.forEach(cl => {
  const levelData = LEVELS.find(l => l.campaignId === cl.id);

  const card = document.createElement('div');
  card.className = 'level-card';

  const h3 = document.createElement('h3');
  h3.textContent = `${cl.id + 1}. ${cl.name}`;
  card.appendChild(h3);

  const desc = document.createElement('p');
  desc.className = 'level-desc';
  desc.textContent = cl.description;
  card.appendChild(desc);

  if (levelData) {
    const canvas = document.createElement('canvas');
    canvas.width  = THUMB_W;
    canvas.height = THUMB_H;
    card.appendChild(canvas);

    const sx = THUMB_W / CANVAS_W, sy = THUMB_H / CANVAS_H;
    const img = new Image();
    img.src = levelData.background;
    img.onload = () => {
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, THUMB_W, THUMB_H);

    };
  } else {
    const placeholder = document.createElement('div');
    placeholder.className = 'level-unbuilt';
    placeholder.textContent = 'Level not yet built';
    card.appendChild(placeholder);
  }

  const meta = document.createElement('div');
  meta.className = 'level-meta';
  meta.style.marginTop = '8px';
  const perWave = cl.enemiesPerWave ?? '—';
  meta.innerHTML = `Gold <span>${cl.startGold}g</span> · Waves <span>${cl.waves}</span> · Enemies/wave <span>${perWave}</span>`;
  card.appendChild(meta);

  levelsGrid.appendChild(card);
});

// ─── Towers ───────────────────────────────────────────────────────────────────
const towersGrid = document.getElementById('towers-grid');
const CARD_SIZE = 120;

for (const t of TURRET_TYPES) {
  const card = document.createElement('div');
  card.className = 'tower-card';

  // Base (Level 1) content lives in a fixed-height block so the upgrade section
  // starts at the same Y on every card → Level 2 rows align horizontally.
  const base = document.createElement('div');
  base.className = 'tower-base';
  card.appendChild(base);

  const h3 = document.createElement('h3');
  h3.textContent = t.label;
  base.appendChild(h3);

  const img = document.createElement('img');
  img.src = t.image;
  img.width  = CARD_SIZE;
  img.height = CARD_SIZE;
  img.style.objectFit = 'contain';
  img.style.padding = '4px';
  base.appendChild(img);

  const stats = document.createElement('div');
  stats.className = 'tower-stats';
  if (t.bulletType === 'none') {
    // Barracks: spawns melee Defenders instead of firing. Defender combat stats
    // come from DEFENDER_TYPE, the same source the game uses.
    stats.innerHTML = `
      Cost: <span>${t.cost}g</span><br>
      Defenders: <span>${t.defenderCount}</span><br>
      Defender HP: <span>${DEFENDER_TYPE.hp}</span><br>
      Defender dmg: <span>${DEFENDER_TYPE.damage}</span><br>
      Perimeter: <span>${t.range}px</span><br>
      Respawn: <span>${(t.respawnDelay / 1000).toFixed(0)}s</span>
    `;
  } else {
    stats.innerHTML = `
      Cost: <span>${t.cost}g</span><br>
      Damage: <span>${t.damage}</span><br>
      Fire rate: <span>${(1000 / t.fireRate).toFixed(1)}/s</span><br>
      Range: <span>${t.range}px</span><br>
      Bullet: <span>${t.bulletType}</span>${t.splashRadius ? `<br>Splash: <span>${t.splashRadius}px</span>` : ''}
    `;
  }
  base.appendChild(stats);

  // Upgrade levels (data-driven): show each upgrade's art + the stats it changes.
  (t.upgrades ?? []).forEach((up, i) => {
    const sec = document.createElement('div');
    sec.className = 'tower-upgrade';

    const label = document.createElement('div');
    label.className = 'tower-stats';
    label.innerHTML = `▲ Level ${i + 2} — Upgrade: <span>${up.cost}g</span>`;
    sec.appendChild(label);

    if (up.image) {
      const upImg = document.createElement('img');
      upImg.src = up.image;
      upImg.width  = CARD_SIZE;
      upImg.height = CARD_SIZE;
      upImg.style.objectFit = 'contain';
      upImg.style.padding = '4px';
      sec.appendChild(upImg);
    }

    // List only the stat fields this upgrade overrides (skip art/cost meta),
    // formatting known fields for readability.
    const fmt = (k, v) => {
      switch (k) {
        case 'damage':       return `Damage: <span>${v}</span>`;
        case 'range':        return `Range: <span>${v}px</span>`;
        case 'fireRate':     return `Fire rate: <span>${(1000 / v).toFixed(1)}/s</span>`;
        case 'respawnDelay': return `Respawn: <span>${(v / 1000).toFixed(0)}s</span>`;
        case 'defenderCount':return `Defenders: <span>${v}</span>`;
        default:             return `${k}: <span>${v}</span>`;
      }
    };
    const changed = Object.entries(up)
      .filter(([k]) => k !== 'image' && k !== 'cost')
      .map(([k, v]) => fmt(k, v))
      .join('<br>');
    if (changed) {
      const diff = document.createElement('div');
      diff.className = 'tower-stats';
      diff.innerHTML = changed;
      sec.appendChild(diff);
    }

    // For a Barracks, also show the upgraded unit it now fields (e.g. Warden).
    if (t.bulletType === 'none') {
      const unit = defenderForLevel(i + 2);   // upgrade i → tower level i+2
      const u = document.createElement('div');
      u.className = 'tower-stats';
      u.innerHTML = `Unit: <span>${unit.key}</span><br>Unit HP: <span>${unit.hp}</span><br>Unit dmg: <span>${unit.damage}</span>`;
      sec.appendChild(u);
    }

    card.appendChild(sec);
  });

  towersGrid.appendChild(card);
}

// ─── Enemies ──────────────────────────────────────────────────────────────────
const enemiesGrid = document.getElementById('enemies-grid');
const ENEMY_SIZE = 120;
const FRAME_W = 100, FRAME_H = 100;
let globalFps = 10;

for (const e of ENEMY_TYPES) {
  const card = document.createElement('div');
  card.className = 'enemy-card';

  const h3 = document.createElement('h3');
  h3.textContent = e.label;
  card.appendChild(h3);

  const canvas = document.createElement('canvas');
  canvas.width  = ENEMY_SIZE;
  canvas.height = ENEMY_SIZE;
  card.appendChild(canvas);

  const stats = document.createElement('div');
  stats.className = 'enemy-stats';
  stats.innerHTML = `
    HP: <span>${e.hp}</span><br>
    Speed: <span>${e.speed.base}–${e.speed.base + e.speed.variance}px/s</span><br>
    Gold: <span>${e.goldReward}g</span>${e.damageResist ? '<br>' + Object.entries(e.damageResist).map(([k,v]) => `Resist Magic: <span>${Math.round((1-v)*100)}%</span>`).join('<br>') : ''}
  `;
  card.appendChild(stats);

  enemiesGrid.appendChild(card);

  // Load spritesheet and animate walk cycle
  const img = new Image();
  img.src = e.spritesheet;
  img.onload = () => {
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    const scale = (ENEMY_SIZE / FRAME_W) * (1 / e.displayScale) * 2.2;
    const drawW = FRAME_W * scale;
    const drawH = FRAME_H * scale;
    const ox = (ENEMY_SIZE - drawW) / 2;
    const oy = (ENEMY_SIZE - drawH) / 2;

    let frameIdx = 0;
    let lastTime = 0;

    function draw(ts) {
      const interval = 1000 / globalFps;
      if (ts - lastTime >= interval) {
        lastTime = ts;
        const absFrame = e.walkRow * e.sheetCols + frameIdx;
        const srcX = (absFrame % e.sheetCols) * FRAME_W;
        const srcY = Math.floor(absFrame / e.sheetCols) * FRAME_H;
        ctx.clearRect(0, 0, ENEMY_SIZE, ENEMY_SIZE);
        ctx.drawImage(img, srcX, srcY, FRAME_W, FRAME_H, ox, oy, drawW, drawH);
        frameIdx = (frameIdx + 1) % e.walkFrames;
      }
      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);
  };
  img.onerror = () => {
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ff4444';
    ctx.font = '10px monospace';
    ctx.fillText('load error', 4, ENEMY_SIZE / 2);
  };
}
</script>
</body>
</html>
